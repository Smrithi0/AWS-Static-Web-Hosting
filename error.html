<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4f6df5, #b04cff);
            color: white;
            text-align: center;
        }

        .error-container {
            max-width: 400px;
        }

        h1 {
            font-size: 80px;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 22px;
            margin-bottom: 15px;
        }

        p {
            font-size: 14px;
            margin-bottom: 20px;
            color: #f1f1f1;
        }

        a {
            display: inline-block;
            padding: 12px 25px;
            background: white;
            color: #333;
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
        }

        a:hover {
            background: #eee;
        }
    </style>
</head>
<body>

    <div class="error-container">
        <h1>404</h1>
        <h2>Oops! Page not found</h2>
        <p>
            The page you're looking for may have been removed 
            or is temporarily unavailable.
        </p>
        <a href="index.html">Go Back Home</a>
    </div>

</body>
</html>
