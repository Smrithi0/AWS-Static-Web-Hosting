<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f4f4;
        }

        header {
            background: #333;
            color: white;
            text-align: center;
            padding: 20px;
        }

        header h1 {
            margin-bottom: 8px;
        }

        header p {
            font-size: 14px;
            color: #ddd;
        }

        nav {
            background: #555;
            text-align: center;
            padding: 12px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 14px;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .container {
            padding: 20px;
            min-height: 70vh;
        }

        section {
            margin-bottom: 25px;
        }

        h2 {
            margin-bottom: 10px;
        }

        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 12px;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
    </style>
</head>
<body>

    <header>
        <h1>Welcome to My Website</h1>
        <p>A simple HTML example</p>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
    </nav>

    <div class="container">
        <section>
            <h2>Home</h2>
            <p>This is a simple website created using only HTML and CSS.</p>
        </section>

        <section id="about">
            <h2>About</h2>
            <p>You can customize this section with your own content.</p>
        </section>

        <section id="contact">
            <h2>Contact</h2>
            <p>Email: example@email.com</p>
        </section>
    </div>

    <footer>
        © 2025 My Website
    </footer>

</body>
</html>
